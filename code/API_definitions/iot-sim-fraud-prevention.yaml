openapi: 3.0.3
info:
  title: IoT SIM Fraud Prevention
  description: |
    API for SIM card binding/unbinding and regional restriction management.

    # Introduction
    This API provides operations to manage security mechanisms for IoT SIM cards:
    - **Bind**: associate a SIM card with a specific device (IMEI) or restrict its operation to a geographic area.
    - **Unbind**: remove an existing binding or area restriction.
    - **Query**: retrieve the current binding status or area restriction for a device.

    When a device attempts to use the network, the operator checks the binding/restriction.
    If the IMEI reported does not match the bound one, or the device location is outside the allowed area,
    network services are automatically blocked.

    # Relevant terms and definitions
    * **SIM card**: IoT network card (subscriber identity module).
    * **Binding**: mechanism linking a SIM card to a specific terminal device (IMEI) to prevent misuse.
    * **Device**: any physical entity that can connect to a network.
    * **IMEI**: International Mobile Equipment Identity, a unique 15-digit identifier for mobile devices.

    # API Functionality
    The API exposes three endpoints:
    - `POST /bind` – bind IMEI or area to a card.
    - `POST /unbind` – unbind IMEI or area from a card.
    - `POST /query` – query binding/restriction status.

    # Authorization and authentication
    The "Camara Security and Interoperability Profile" provides details of how an API consumer requests an access token. Please refer to Identity and Consent Management (https://github.com/camaraproject/IdentityAndConsentManagement/) for the released version of the profile.

    The specific authorization flows to be used will be agreed upon during the onboarding process, happening between the API consumer and the API provider, taking into account the declared purpose for accessing the API, whilst also being subject to the prevailing legal framework dictated by local legislation.

    In cases where personal data is processed by the API and users can exercise their rights through mechanisms such as opt-in and/or opt-out, the use of three-legged access tokens is mandatory. This ensures that the API remains in compliance with privacy regulations, upholding the principles of transparency and user-centric privacy-by-design.

    # Additional CAMARA error responses
    The list of error codes in this API specification is not exhaustive. Therefore the API specification MAY not document some non-mandatory error statuses as indicated in `CAMARA API Design Guide`.
    Please refer to the `CAMARA_common.yaml` of the Commonalities Release associated to this API version for a complete list of error responses. The applicable Commonalities Release can be identified in the `API Readiness Checklist` document associated to this API version.
    As a specific rule, error `501 - NOT_IMPLEMENTED` can be only a possible error response if it is explicitly documented in the API.

  version: wip
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  x-camara-commonalities: 0.6
externalDocs:
  description: CAMARA API Design Guidelines
  url: https://github.com/camaraproject/Commonalities/blob/main/documentation/API-design/API-design.md
servers:
  - url: "{apiRoot}/iot-sim-fraud-prevention/vwip"
    variables:
      apiRoot:
        default: http://localhost:9091
        description: API root
paths:
  /bind:
    post:
      tags:
        - Bind sim card fraud prevention
      summary: Bind device IMEI or area restrictions
      description: Associate a SIM card with a specific IMEI or restrict it to a geographic area.
      operationId: BindDeviceImei
      parameters:
        - $ref: "#/components/parameters/x-correlator"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BindDeviceImeiRequest"
            examples:
              INPUT_IPV4_ADDRESS:
                summary: bind imei For One Device By IPv4 Address
                description: Use the IPv4 address of a device for binding operations
                value:
                  device:
                    ipv4Address:
                      publicAddress: "203.0.113.0"
                      publicPort: 59765
                  bindType: "IMEIBIND"
              INPUT_IPV6_ADDRESS:
                summary: bind imei For One Device By IPv6 Address
                description: Use the IPv6 address of a device for binding operations
                value:
                  device:
                    ipv6Address: "2001:db8:85a3:8d3:1319:8a2e:370:7344"
                  bindType: "IMEIBIND"
              INPUT_PHONE_NUMBER:
                summary: bind imei For One Device By Phone Number
                description: Use a device's number for binding operation
                value:
                  device:
                    phoneNumber: "+123456789"
                  bindType: "IMEIBIND"
              INPUT_NETWORK_ACCESS_IDENTIFIER:
                summary: bind imei For One Device By Network Access Identifier
                description: Use a device's network access identifier for binding operations
                value:
                  device:
                    networkAccessIdentifier: "123456789@domain.com"
                  bindType: "IMEIBIND"
              INPUT_BIND_TYPE:
                summary: bind imei For One Device By 3 Legged Token
                description: Use a 3 Legged Token for binding operations (no device object needed)
                value:
                  bindType: "IMEIBIND"
      responses:
        "200":
          description: The result of binding the device
          headers:
            x-correlator:
              $ref: "#/components/headers/x-correlator"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BindDeviceImeiResponse"
              examples:
                BIND_SUCCESS:
                  summary: BOUND SUCCESSFULLY
                  description: The result of binding the device is successful
                  value:
                    bound: "TRUE"
                BIND_FAIL:
                  summary: BOUND FAILED
                  description: The result of binding the device is a failure
                  value:
                    bound: "FALSE"
        "400":
          $ref: "#/components/responses/BindBadRequest400"
        "401":
          $ref: "#/components/responses/Generic401"
        "403":
          $ref: "#/components/responses/Generic403"
        "404":
          $ref: "#/components/responses/Generic404"
        "422":
          $ref: "#/components/responses/Bind422"
        "429":
          $ref: "#/components/responses/Generic429"
      security:
        - openId:
            - "iot-sim-fraud-prevention:bind"

  /unbind:
    post:
      tags:
        - Unbind sim card fraud prevention
      summary: Unbind device IMEI or area restrictions
      description: Remove an existing IMEI binding or area restriction from a device.
      operationId: UnBindDeviceImei
      parameters:
        - $ref: "#/components/parameters/x-correlator"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnBindDeviceImeiRequest"
            examples:
              INPUT_IPV4_ADDRESS:
                summary: unbind imei For One Device By IPv4 Address
                description: Use the IPv4 address of a device for unbinding operations
                value:
                  device:
                    ipv4Address:
                      publicAddress: "203.0.113.0"
                      publicPort: 59765
                  unBindType: "IMEIBIND"
              INPUT_IPV6_ADDRESS:
                summary: unbind imei For One Device By IPv6 Address
                description: Use the IPv6 address of a device for unbinding operations
                value:
                  device:
                    ipv6Address: "2001:db8:85a3:8d3:1319:8a2e:370:7344"
                  unBindType: "IMEIBIND"
              INPUT_PHONE_NUMBER:
                summary: unbind imei For One Device By Phone Number
                description: Use a device's number for unbinding operation
                value:
                  device:
                    phoneNumber: "+123456789"
                  unBindType: "IMEIBIND"
              INPUT_NETWORK_ACCESS_IDENTIFIER:
                summary: unbind imei For One Device By Network Access Identifier
                description: Use a device's network access identifier for unbinding operations
                value:
                  device:
                    networkAccessIdentifier: "123456789@domain.com"
                  unBindType: "IMEIBIND"
              INPUT_UNBIND_TYPE:
                summary: unbind imei For One Device By 3 Legged Token
                description: Use a 3 Legged Token for unbinding operations (no device object needed)
                value:
                  unBindType: "IMEIBIND"
      responses:
        "200":
          description: The result of unbinding the device
          headers:
            x-correlator:
              $ref: "#/components/headers/x-correlator"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnBindDeviceImeiResponse"
              examples:
                UNBIND_SUCCESS:
                  summary: UNBOUND SUCCESSFULLY
                  description: The result of unbinding the device is successful
                  value:
                    unbound: "TRUE"
                UNBIND_FAIL:
                  summary: UNBOUND FAILED
                  description: The result of unbinding the device is a failure
                  value:
                    unbound: "FALSE"
        "400":
          $ref: "#/components/responses/UnbindBadRequest400"
        "401":
          $ref: "#/components/responses/Generic401"
        "403":
          $ref: "#/components/responses/Generic403"
        "404":
          $ref: "#/components/responses/Generic404"
        "422":
          $ref: "#/components/responses/Unbind422"
        "429":
          $ref: "#/components/responses/Generic429"
      security:
        - openId:
            - "iot-sim-fraud-prevention:unbind"

  /query:
    post:
      tags:
        - Query card fraud prevention
      summary: IoT SIM Fraud Prevention Query
      description: Retrieve the current IMEI binding status or area restriction for a device.
      operationId: query
      parameters:
        - $ref: "#/components/parameters/x-correlator"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
            examples:
              INPUT_IPV4_ADDRESS:
                summary: query For One Device By IPv4 Address
                description: Use the IPv4 address of a device for query operations
                value:
                  device:
                    ipv4Address:
                      publicAddress: "203.0.113.0"
                      publicPort: 59765
                  queryType: "IMEIBIND"
              INPUT_IPV6_ADDRESS:
                summary: query For One Device By IPv6 Address
                description: Use the IPv6 address of a device for query operations
                value:
                  device:
                    ipv6Address: "2001:db8:85a3:8d3:1319:8a2e:370:7344"
                  queryType: "IMEIBIND"
              INPUT_PHONE_NUMBER:
                summary: query For One Device By Phone Number
                description: Use a device's number for query operation
                value:
                  device:
                    phoneNumber: "+123456789"
                  queryType: "IMEIBIND"
              INPUT_NETWORK_ACCESS_IDENTIFIER:
                summary: query For One Device By Network Access Identifier
                description: Use a device's network access identifier for query operations
                value:
                  device:
                    networkAccessIdentifier: "123456789@domain.com"
                  queryType: "IMEIBIND"
              INPUT_UNBIND_TYPE:
                summary: query For One Device By 3 Legged Token
                description: Use a 3 Legged Token for query operations (no device object needed)
                value:
                  queryType: "IMEIBIND"
      responses:
        "200":
          description: The result of query the device
          headers:
            x-correlator:
              $ref: "#/components/headers/x-correlator"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryFraudPreventionResponse"
              examples:
                AREA_LIMIT_RESULT:
                  summary: AREALIMIT RESULT
                  description: The result of query sim card area limit
                  value:
                    areaLimit:
                      areaLimitStatus: "RESTRICTED"
                      limitArea:
                        areaType: "CIRCLE"
                        center:
                          latitude: 50.735851
                          longitude: 7.10066
                        radius: 50000
                IMEI_BIND_RESULT:
                  summary: BINDIMEI RESULT
                  description: The result of query sim card imei bind
                  value:
                    imeiBind:
                      bindImei: "35-209900-176148-1"
                      bindStatus: "BOUND"
        "400":
          $ref: "#/components/responses/QueryBadRequest400"
        "401":
          $ref: "#/components/responses/Generic401"
        "403":
          $ref: "#/components/responses/Generic403"
        "404":
          $ref: "#/components/responses/Generic404"
        "422":
          $ref: "#/components/responses/Query422"
        "429":
          $ref: "#/components/responses/Generic429"
      security:
        - openId:
            - "iot-sim-fraud-prevention:query"

components:
  securitySchemes:
    openId:
      description: OpenID Connect authentication
      type: openIdConnect
      openIdConnectUrl: https://example.org/.well-known/openid-configuration
  parameters:
    x-correlator:
      name: x-correlator
      in: header
      description: Correlation id for the different services
      schema:
        $ref: "#/components/schemas/XCorrelator"
  headers:
    x-correlator:
      description: Correlation id for the different services
      schema:
        $ref: "#/components/schemas/XCorrelator"
  schemas:
    XCorrelator:
      type: string
      description: Correlation id for the request
      example: "123e4567-e89b-12d3-a456-426614174000"
      pattern: ^[a-zA-Z0-9-]{0,55}$

    # ---------- Bind / Unbind / Query common schemas ----------
    Device:
      description: |
        End-user device able to connect to a mobile network.
        The developer can choose to provide one or more of the following identifiers:
        * `ipv4Address`
        * `ipv6Address`
        * `phoneNumber`
        * `networkAccessIdentifier`
        If multiple identifiers are provided, they MUST belong to the same device.
      type: object
      properties:
        phoneNumber:
          $ref: "#/components/schemas/PhoneNumber"
        networkAccessIdentifier:
          $ref: "#/components/schemas/NetworkAccessIdentifier"
        ipv4Address:
          $ref: "#/components/schemas/DeviceIpv4Addr"
        ipv6Address:
          $ref: "#/components/schemas/DeviceIpv6Address"
      minProperties: 1

    PhoneNumber:
      description: A public identifier addressing a telephone subscription, formatted according to E.164 with a leading '+'.
      type: string
      pattern: '^\+[1-9][0-9]{4,14}$'
      example: "+123456789"

    NetworkAccessIdentifier:
      description: A public identifier addressing a subscription in a mobile network (e.g., GPSI formatted as External Identifier).
      type: string
      example: "123456789@domain.com"

    DeviceIpv4Addr:
      type: object
      description: |
        Identification of a device using its IPv4 address.
        At least one of `privateAddress` or `publicPort` must be provided together with `publicAddress`.
      properties:
        publicAddress:
          $ref: "#/components/schemas/SingleIpv4Addr"
        privateAddress:
          $ref: "#/components/schemas/SingleIpv4Addr"
        publicPort:
          $ref: "#/components/schemas/Port"
      anyOf:
        - required: [publicAddress, privateAddress]
        - required: [publicAddress, publicPort]
      example:
        publicAddress: "84.125.93.10"
        publicPort: 59765

    SingleIpv4Addr:
      description: A single IPv4 address with no subnet mask.
      type: string
      format: ipv4
      example: "84.125.93.10"

    Port:
      description: TCP or UDP port number.
      type: integer
      minimum: 0
      maximum: 65535

    DeviceIpv6Address:
      description: |
        A single IPv6 address identifying the device.
      type: string
      format: ipv6
      example: "2001:db8:85a3:8d3:1319:8a2e:370:7344"

    # ---------- Bind ----------
    BindType:
      type: string
      description: The type of binding operation (IMEI or area limit).
      enum:
        - AREALIMIT
        - IMEIBIND

    BindDeviceImeiRequest:
      description: Request to bind IMEI or area limit to a device.
      type: object
      properties:
        device:
          $ref: "#/components/schemas/Device"
        bindType:
          $ref: "#/components/schemas/BindType"
      required:
        - bindType

    BindDeviceImeiResponse:
      description: Response indicating whether the binding operation succeeded.
      type: object
      required:
        - bound
      properties:
        bound:
          type: string
          description: "TRUE if binding succeeded, FALSE otherwise."
          example: "TRUE"

    # ---------- Unbind ----------
    UnbindType:
      type: string
      description: The type of unbinding operation (IMEI or area limit).
      enum:
        - AREALIMIT
        - IMEIBIND

    UnBindDeviceImeiRequest:
      description: Request to unbind IMEI or area limit from a device.
      type: object
      properties:
        device:
          $ref: "#/components/schemas/Device"
        unBindType:
          $ref: "#/components/schemas/UnbindType"
      required:
        - unBindType

    UnBindDeviceImeiResponse:
      description: Response indicating whether the unbinding operation succeeded.
      type: object
      required:
        - unbound
      properties:
        unbound:
          type: string
          description: "TRUE if unbinding succeeded, FALSE otherwise."
          example: "TRUE"

    # ---------- Query ----------
    QueryType:
      type: string
      description: The type of query (IMEI binding or area limit).
      enum:
        - AREALIMIT
        - IMEIBIND

    QueryRequest:
      description: Request to query the current status.
      type: object
      properties:
        device:
          $ref: "#/components/schemas/Device"
        queryType:
          $ref: "#/components/schemas/QueryType"
      required:
        - queryType

    QueryFraudPreventionResponse:
      description: Response containing the requested status.
      type: object
      properties:
        areaLimit:
          $ref: "#/components/schemas/AreaLimit"
        imeiBind:
          $ref: "#/components/schemas/ImeiBind"

    ImeiBind:
      description: IMEI binding status and bound IMEI (if any).
      type: object
      properties:
        bindImei:
          $ref: "#/components/schemas/BindImei"
        bindStatus:
          $ref: "#/components/schemas/BindStatus"

    BindImei:
      description: The IMEI currently bound to the SIM card (15 digits).
      type: string
      example: "35-209900-176148-1"

    BindStatus:
      description: |
        Status of the IMEI binding.
        - `BOUND`: an IMEI is bound.
        - `UNBOUND`: no IMEI is bound.
      type: string
      enum:
        - BOUND
        - UNBOUND

    AreaLimit:
      description: Area restriction status and details of the restricted area.
      type: object
      properties:
        limitArea:
          $ref: "#/components/schemas/Area"
        areaLimitStatus:
          $ref: "#/components/schemas/AreaLimitStatus"

    AreaLimitStatus:
      description: |
        Current status of area restrictions.
        - `RESTRICTED`: the device is currently restricted to a specific area.
        - `UNRESTRICTED`: no area restriction is active.
      type: string
      enum:
        - RESTRICTED
        - UNRESTRICTED

    # ---------- Geographic area ----------
    Area:
      description: Base schema for geographic areas.
      type: object
      properties:
        areaType:
          $ref: "#/components/schemas/AreaType"
        point:
          $ref: "#/components/schemas/Point"
      required:
        - areaType
      discriminator:
        propertyName: areaType
        mapping:
          CIRCLE: "#/components/schemas/Circle"

    AreaType:
      type: string
      description: Type of the area.
      enum:
        - CIRCLE

    Circle:
      description: A circular area defined by a center point and a radius.
      allOf:
        - $ref: "#/components/schemas/Area"
        - type: object
          properties:
            center:
              $ref: "#/components/schemas/Point"
            radius:
              type: integer
              description: Radius in meters (minimum 1, maximum 200000).
              minimum: 1
              maximum: 200000
          required:
            - center
            - radius
      example:
        areaType: CIRCLE
        center:
          latitude: 50.735851
          longitude: 7.10066
        radius: 50000

    Point:
      type: object
      description: Coordinates (latitude, longitude).
      required:
        - latitude
        - longitude
      properties:
        latitude:
          $ref: "#/components/schemas/Latitude"
        longitude:
          $ref: "#/components/schemas/Longitude"
      example:
        latitude: 50.735851
        longitude: 7.10066

    Latitude:
      description: Latitude component (-90 to 90).
      type: number
      format: double
      minimum: -90
      maximum: 90
      example: 50.735851

    Longitude:
      description: Longitude component (-180 to 180).
      type: number
      format: double
      minimum: -180
      maximum: 180
      example: 7.10066

    # ---------- Error ----------
    ErrorInfo:
      description: Common error schema.
      type: object
      required:
        - status
        - code
        - message
      properties:
        status:
          type: integer
          description: HTTP status code.
        code:
          type: string
          description: Error code.
        message:
          type: string
          description: Human-readable explanation.

  # ---------- Responses ----------
  responses:
    BindBadRequest400:
      description: Bad Request
      headers:
        x-correlator:
          $ref: "#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ErrorInfo"
              - type: object
                properties:
                  status:
                    enum:
                      - 400
                  code:
                    enum:
                      - INVALID_ARGUMENT
                      - OUT_OF_RANGE
          examples:
            Insufficient Device Parameters:
              description: Sufficient parameters must be provided to allow the target UE to be identified
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "At least one of phoneNumber, networkAccessIdentifier, ipv4Address and ipv6Address must be specified"
            Insufficient BindType Parameters:
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "BindType must be specified"
            Inconsistent Device Properties:
              description: Device parameters provided identify different devices
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "Multiple inconsistent device parameters specified"
            Invalid Network Access Identifier:
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "Invalid format: networkAccessIdentifier"
            Invalid Phone Number:
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "Invalid format: phoneNumber"
            Invalid IPv4 Address:
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "Invalid format: ipv4Address"
            Invalid IPv6 Address:
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "Invalid format: ipv6Address"
            Invalid Port Value:
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "Invalid value: ipv4Address.publicPort"
            Invalid BindType Value:
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "The value of bindType can only be IMEIBIND,AREALIMIT"

    UnbindBadRequest400:
      description: Bad Request
      headers:
        x-correlator:
          $ref: "#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ErrorInfo"
              - type: object
                properties:
                  status:
                    enum:
                      - 400
                  code:
                    enum:
                      - INVALID_ARGUMENT
                      - OUT_OF_RANGE
          examples:
            Insufficient Device Parameters:
              description: Sufficient parameters must be provided to allow the target UE to be identified
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "At least one of phoneNumber, networkAccessIdentifier, ipv4Address and ipv6Address must be specified"
            Insufficient UnbindType Parameters:
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "UnbindType must be specified"
            Inconsistent Device Properties:
              description: Device parameters provided identify different devices
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "Multiple inconsistent device parameters specified"
            Invalid Network Access Identifier:
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "Invalid format: networkAccessIdentifier"
            Invalid Phone Number:
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "Invalid format: phoneNumber"
            Invalid IPv4 Address:
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "Invalid format: ipv4Address"
            Invalid IPv6 Address:
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "Invalid format: ipv6Address"
            Invalid Port Value:
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "Invalid value: ipv4Address.publicPort"
            Invalid UnbindType Value:
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "The value of unbindType can only be IMEIBIND,AREALIMIT"

    QueryBadRequest400:
      description: Bad Request
      headers:
        x-correlator:
          $ref: "#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ErrorInfo"
              - type: object
                properties:
                  status:
                    enum:
                      - 400
                  code:
                    enum:
                      - INVALID_ARGUMENT
                      - OUT_OF_RANGE
          examples:
            Insufficient Device Parameters:
              description: Sufficient parameters must be provided to allow the target UE to be identified
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "At least one of phoneNumber, networkAccessIdentifier, ipv4Address and ipv6Address must be specified"
            Insufficient QueryType Parameters:
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "QueryType must be specified"
            Inconsistent Device Properties:
              description: Device parameters provided identify different devices
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "Multiple inconsistent device parameters specified"
            Invalid Network Access Identifier:
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "Invalid format: networkAccessIdentifier"
            Invalid Phone Number:
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "Invalid format: phoneNumber"
            Invalid IPv4 Address:
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "Invalid format: ipv4Address"
            Invalid IPv6 Address:
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "Invalid format: ipv6Address"
            Invalid Port Value:
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "Invalid value: ipv4Address.publicPort"
            Invalid QueryType Value:
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "The value of queryType can only be IMEIBIND,AREALIMIT"

    Generic400:
      description: Bad Request
      headers:
        x-correlator:
          $ref: "#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ErrorInfo"
              - type: object
