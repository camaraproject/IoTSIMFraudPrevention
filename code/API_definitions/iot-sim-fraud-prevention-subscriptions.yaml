openapi: 3.0.3
info:
  title: IoT SIM Fraud Prevention Subscriptions
  description: |
    API to subscribe to events related to SIM card binding and regional restrictions.

    # Introduction
    This API allows enterprise customers to subscribe to risk control information about IoT SIM cards.
    When a bound device changes IMEI or moves in/out of a restricted area, a notification is sent to the registered callback endpoint.

    # Relevant terms and definitions
    * **SIM card**: IoT network card (subscriber identity module).
    * **Binding**: mechanism linking a SIM card to a specific terminal device (IMEI) or area.
    * **Device**: any physical entity that can connect to a network.
    * **IMEI**: International Mobile Equipment Identity.

    # API Functionality
    The API provides endpoints to manage subscriptions:
    - `POST /subscriptions` – create a subscription.
    - `GET /subscriptions/{subscriptionId}` – retrieve a subscription.
    - `DELETE /subscriptions/{subscriptionId}` – delete a subscription.

    # Notifications
    When a subscribed event occurs, the server sends a `POST` request to the `sink` URL provided by the subscriber.
    The notification payload conforms to the CloudEvents specification.

    # Authorization and authentication
    The "Camara Security and Interoperability Profile" provides details of how an API consumer requests an access token. Please refer to Identity and Consent Management (https://github.com/camaraproject/IdentityAndConsentManagement/) for the released version of the profile.

    The specific authorization flows to be used will be agreed upon during the onboarding process, happening between the API consumer and the API provider, taking into account the declared purpose for accessing the API, whilst also being subject to the prevailing legal framework dictated by local legislation.

    In cases where personal data is processed by the API and users can exercise their rights through mechanisms such as opt-in and/or opt-out, the use of three-legged access tokens is mandatory. This ensures that the API remains in compliance with privacy regulations, upholding the principles of transparency and user-centric privacy-by-design.

    # Additional CAMARA error responses
    The list of error codes in this API specification is not exhaustive. Therefore the API specification MAY not document some non-mandatory error statuses as indicated in `CAMARA API Design Guide`.
    Please refer to the `CAMARA_common.yaml` of the Commonalities Release associated to this API version for a complete list of error responses. The applicable Commonalities Release can be identified in the `API Readiness Checklist` document associated to this API version.
    As a specific rule, error `501 - NOT_IMPLEMENTED` can be only a possible error response if it is explicitly documented in the API.

  version: wip
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  x-camara-commonalities: 0.7.0
externalDocs:
  description: CAMARA API Design Guidelines
  url: https://github.com/camaraproject/Commonalities/blob/main/documentation/API-design/API-design.md
servers:
  - url: "{apiRoot}/iot-sim-fraud-prevention-subscriptions/vwip"
    variables:
      apiRoot:
        default: http://localhost:9091
        description: API root
paths:
  /subscriptions:
    post:
      tags:
        - Subscription sim card fraud prevention
      summary: Subscribe to IMEI or area change events
      description: |
        Create a subscription to receive notifications when the IMEI of a device changes or when it enters/leaves a restricted area.
      operationId: subscribeFraudPrevention
      parameters:
        - $ref: "#/components/parameters/x-correlator"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscribeFraudPreventionRequest"
            examples:
              INPUT_IPV4_ADDRESS:
                summary: Subscription For One Device By IPv4 Address
                description: Use the IPv4 address of a device for subscription operations
                value:
                  config:
                    subscriptionExpireTime: "2024-03-22T05:40:58.469Z"
                    initialEvent: true
                    subscriptionMaxEvents: 10
                    subscriptionDetail:
                      device:
                        ipv4Address:
                          publicAddress: "203.0.113.0"
                          publicPort: 59765
                  types:
                    - "org.camaraproject.iot-sim-fraud-prevention.v0.imei-change"
                  sink: "https://notificationSendServer12.supertelco.com"
                  protocol: "HTTP"
                  sinkCredential:
                    credentialType: "ACCESSTOKEN"
                    accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9"
                    accessTokenExpiresUtc: "2024-03-23T05:40:58.469Z"
                    accessTokenType: "bearer"
              INPUT_IPV6_ADDRESS:
                summary: Subscription For One Device By IPV6 Address
                description: Use the IPv6 address of a device for subscription operations
                value:
                  config:
                    subscriptionExpireTime: "2024-03-22T05:40:58.469Z"
                    initialEvent: true
                    subscriptionMaxEvents: 10
                    subscriptionDetail:
                      device:
                        ipv6Address: "2001:db8:85a3:8d3:1319:8a2e:370:7344"
                  types:
                    - "org.camaraproject.iot-sim-fraud-prevention.v0.imei-change"
                  sink: "https://notificationSendServer12.supertelco.com"
                  protocol: "HTTP"
                  sinkCredential:
                    credentialType: "ACCESSTOKEN"
                    accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9"
                    accessTokenExpiresUtc: "2024-03-23T05:40:58.469Z"
                    accessTokenType: "bearer"
              INPUT_PHONE_NUMBER:
                summary: Subscription For One Device By Device Number
                description: Use a device's phone number for subscription operation
                value:
                  config:
                    subscriptionExpireTime: "2024-03-22T05:40:58.469Z"
                    initialEvent: true
                    subscriptionMaxEvents: 10
                    subscriptionDetail:
                      device:
                        phoneNumber: "+123456789"
                  types:
                    - "org.camaraproject.iot-sim-fraud-prevention.v0.imei-change"
                  sink: "https://notificationSendServer12.supertelco.com"
                  protocol: "HTTP"
                  sinkCredential:
                    credentialType: "ACCESSTOKEN"
                    accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9"
                    accessTokenExpiresUtc: "2024-03-23T05:40:58.469Z"
                    accessTokenType: "bearer"
              INPUT_NETWORK_ACCESS_IDENTIFIER:
                summary: Subscription For One Device By Network Access Identification
                description: Use a device's network access identifier for subscription operations
                value:
                  config:
                    subscriptionExpireTime: "2024-03-22T05:40:58.469Z"
                    initialEvent: true
                    subscriptionMaxEvents: 10
                    subscriptionDetail:
                      device:
                        networkAccessIdentifier: "123456789@domain.com"
                  types:
                    - "org.camaraproject.iot-sim-fraud-prevention.v0.imei-change"
                  sink: "https://notificationSendServer12.supertelco.com"
                  protocol: "HTTP"
                  sinkCredential:
                    credentialType: "ACCESSTOKEN"
                    accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9"
                    accessTokenExpiresUtc: "2024-03-23T05:40:58.469Z"
                    accessTokenType: "bearer"
      callbacks:
        notifications:
          "{$request.body#/sink}":
            post:
              summary: "notifications callback"
              description: |
                Important note: This endpoint will be implemented by API users.
                Whenever an IMEI or area change event occurs, the server will call this endpoint.
              operationId: postNotification
              parameters:
                - $ref: "#/components/parameters/x-correlator"
              requestBody:
                required: true
                content:
                  application/cloudevents+json:
                    schema:
                      $ref: "#/components/schemas/NotificationEvent"
                    examples:
                      IMEI_CHANGE:
                        description: The trigger event when the device IMEI has changed
                        value:
                          specversion: "1.0"
                          source: "https://api.example.com"
                          id: "b4333c46-49c0-4f62-80d7-f0ef930f1c46"
                          type: "org.camaraproject.iot-sim-fraud-prevention.v0.imei-change"
                          datacontenttype: "application/json"
                          time: "2023-03-22T05:40:23.682Z"
                          data:
                            subscriptionId: "987654321"
                            imei: "35-209900-176148-1"
                            device:
                              phoneNumber: "+123456789"
                      AREA_CHANGE:
                        description: The trigger event when the device area has changed
                        value:
                          specversion: "1.0"
                          source: "https://api.example.com"
                          id: "b4333c46-49c0-4f62-80d7-f0ef930f1c47"
                          type: "org.camaraproject.iot-sim-fraud-prevention.v0.area-change"
                          datacontenttype: "application/json"
                          time: "2023-03-22T05:41:23.682Z"
                          data:
                            subscriptionId: "987654321"
                            area:
                              areaType: "CIRCLE"
                              center:
                                latitude: 50.735851
                                longitude: 7.10066
                              radius: 2000
                            device:
                              phoneNumber: "+123456789"
              responses:
                "204":
                  description: Successful notification.
                  headers:
                    x-correlator:
                      $ref: "#/components/headers/x-correlator"
                "400":
                  $ref: "#/components/responses/CallbackBadRequest400"
                "401":
                  $ref: "#/components/responses/Generic401"
                "403":
                  $ref: "#/components/responses/Generic403"
                "404":
                  $ref: "#/components/responses/Generic404"
                "410":
                  $ref: "#/components/responses/Callback410"
                "429":
                  $ref: "#/components/responses/Generic429"
              security:
                - {}
                - notificationsBearerAuth: []
      responses:
        "201":
          description: Created (Successful creation of subscription).
          headers:
            x-correlator:
              $ref: "#/components/headers/x-correlator"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        "202":
          description: |
            The result of subscription machine card binding or region restriction change events
          headers:
            x-correlator:
              $ref: "#/components/headers/x-correlator"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscribeFraudPreventionResponseAsync"
              examples:
                RESULT_SUBSCRIPTION_ID:
                  summary: subscription result
                  description: |
                    The result of subscription device's IMEI or region change
                  value:
                    subscriptionId: "1119920371"
        "400":
          $ref: "#/components/responses/SubscribeBadRequest400"
        "401":
          $ref: "#/components/responses/Generic401"
        "403":
          $ref: "#/components/responses/Generic403"
        "404":
          $ref: "#/components/responses/Generic404"
        "422":
          $ref: "#/components/responses/Subscribe422"
        "429":
          $ref: "#/components/responses/Generic429"
      security:
        - openId:
            - "iot-sim-fraud-prevention-subscriptions:subscribe"

    get:
      tags:
        - Subscription management
      summary: List subscriptions
      description: Retrieve a list of existing subscriptions.
      operationId: listSubscriptions
      parameters:
        - $ref: "#/components/parameters/x-correlator"
      responses:
        "200":
          description: List of subscription details.
          headers:
            x-correlator:
              $ref: "#/components/headers/x-correlator"
          content:
            application/json:
              schema:
                type: array
                minItems: 0
                maxItems: 1000
                items:
                  $ref: "#/components/schemas/Subscription"
        "400":
          $ref: "#/components/responses/Generic400"
        "401":
          $ref: "#/components/responses/Generic401"
        "403":
          $ref: "#/components/responses/Generic403"
        "404":
          $ref: "#/components/responses/Generic404"
        "429":
          $ref: "#/components/responses/Generic429"
      security:
        - openId:
            - "iot-sim-fraud-prevention-subscriptions:read"

  /subscriptions/{subscriptionId}:
    get:
      tags:
        - Subscription management
      summary: Get subscription details
      description: Retrieve the details of an existing subscription.
      operationId: getSubscription
      parameters:
        - $ref: "#/components/parameters/x-correlator"
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: string
          description: Identifier of the subscription.
      responses:
        "200":
          description: Subscription details.
          headers:
            x-correlator:
              $ref: "#/components/headers/x-correlator"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        "400":
          $ref: "#/components/responses/Generic400"
        "401":
          $ref: "#/components/responses/Generic401"
        "403":
          $ref: "#/components/responses/Generic403"
        "404":
          $ref: "#/components/responses/Generic404"
        "429":
          $ref: "#/components/responses/Generic429"
      security:
        - openId:
            - "iot-sim-fraud-prevention-subscriptions:read"

    delete:
      tags:
        - Subscription management
      summary: Delete subscription
      description: Delete an existing subscription. After deletion, no further notifications will be sent.
      operationId: deleteSubscription
      parameters:
        - $ref: "#/components/parameters/x-correlator"
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: string
          description: Identifier of the subscription.
      responses:
        "204":
          description: Subscription successfully deleted.
          headers:
            x-correlator:
              $ref: "#/components/headers/x-correlator"
        "202":
          description: Request accepted to be processed asynchronously.
          headers:
            x-correlator:
              $ref: "#/components/headers/x-correlator"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionAsync"
        "400":
          $ref: "#/components/responses/Generic400"
        "401":
          $ref: "#/components/responses/Generic401"
        "403":
          $ref: "#/components/responses/Generic403"
        "404":
          $ref: "#/components/responses/Generic404"
        "429":
          $ref: "#/components/responses/Generic429"
      security:
        - openId:
            - "iot-sim-fraud-prevention-subscriptions:delete"

components:
  securitySchemes:
    notificationsBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: "{$request.body#/sinkCredential.credentialType}"
      description: |
        Bearer token authentication for the callback endpoint. The token format is determined
        by `sinkCredential.credentialType` in the subscription request.
    openId:
      description: OpenID Connect authentication
      type: openIdConnect
      openIdConnectUrl: https://example.org/.well-known/openid-configuration
  parameters:
    x-correlator:
      name: x-correlator
      in: header
      description: Correlation id for the different services
      schema:
        $ref: "#/components/schemas/XCorrelator"
  headers:
    x-correlator:
      description: Correlation id for the different services
      schema:
        $ref: "#/components/schemas/XCorrelator"
  schemas:
    XCorrelator:
      type: string
      description: Correlation id for the request
      example: "b4333c46-49c0-4f62-80d7-f0ef930f1c46"
      pattern: ^[a-zA-Z0-9-_:;.\/<>{}]{0,256}$

    # ---------- Notification ----------
    CloudEvent:
      type: object
      description: |
        CloudEvents 1.0 specification envelope.
        This schema is the stable base for all CAMARA event notifications.
      required:
        - id
        - source
        - specversion
        - type
        - time
      properties:
        id:
          type: string
          maxLength: 256
          description: Identifier of this event, unique within the source context.
        source:
          $ref: "#/components/schemas/Source"
        type:
          type: string
          maxLength: 512
          description: |
            Identifies the event type. CAMARA APIs use reverse-DNS notation:
            `org.camaraproject.<api-name>.<event-version>.<event-name>`
        specversion:
          type: string
          description: Version of the specification to which this event conforms (must be 1.0 if it conforms to cloudevents 1.0.2 version)
          enum:
            - "1.0"
        datacontenttype:
          type: string
          description: 'media-type that describes the event payload encoding, must be "application/json" for CAMARA APIs'
          enum:
            - application/json
        data:
          type: object
          description: Event details payload. Structure is defined by each concrete event schema.
        time:
          $ref: "#/components/schemas/DateTime"

    Source:
      type: string
      format: uri-reference
      minLength: 1
      maxLength: 2048
      description: |
        Identifies the context in which an event happened - be a non-empty `URI-reference` like:
        - URI with a DNS authority:
          * https://github.com/cloudevents
          * mailto:cncf-wg-serverless@lists.cncf.io
        - Universally-unique URN with a UUID:
          * urn:uuid:6e8bc430-9c3a-11d9-9669-0800200c9a66
        - Application-specific identifier:
          * /cloudevents/spec/pull/123
          * 1-555-123-4567
      example: "https://api.example.com"

    DateTime:
      type: string
      format: date-time
      maxLength: 64
      description: Timestamp of when the occurrence happened. It must follow [RFC 3339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6) and must have time zone.
      example: "2018-04-05T17:31:00Z"

    # ─────────────────────────────────────────────────────────────────────────
    # API-specific notification event group
    # ─────────────────────────────────────────────────────────────────────────

    ApiNotificationEvent:
      description: |
        API-specific notification event group.
        Extends the CloudEvent envelope and constrains `type` to the set of
        event types defined by this API project.
      allOf:
        - $ref: "#/components/schemas/CloudEvent"
        - type: object
          properties:
            type:
              $ref: "#/components/schemas/ApiEventType"
      discriminator:
        propertyName: "type"
        mapping:
          org.camaraproject.iot-sim-fraud-prevention.v0.imei-change: "#/components/schemas/ImeiChangeEvent"
          org.camaraproject.iot-sim-fraud-prevention.v0.area-change: "#/components/schemas/AreaChangeEvent"

    ApiEventType:
      type: string
      description: |
        Enum of API-specific event type strings for this API project.
        The reverse-DNS prefix `org.camaraproject.iot-sim-fraud-prevention` makes each value
        globally unique.
      enum:
        - org.camaraproject.iot-sim-fraud-prevention.v0.imei-change
        - org.camaraproject.iot-sim-fraud-prevention.v0.area-change

    ImeiChangeEvent:
      description: Event structure for IMEI change notification
      allOf:
        - $ref: "#/components/schemas/ApiNotificationEvent"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ImeiChangeEventData"

    ImeiChangeEventData:
      type: object
      required:
        - subscriptionId
        - imei
        - device
      properties:
        subscriptionId:
          type: string
          description: The ID of the subscription that triggered this notification
          example: "987654321"
        imei:
          type: string
          description: The new IMEI of the device
          example: "35-209900-176148-1"
        device:
          $ref: "#/components/schemas/Device"

    AreaChangeEvent:
      description: Event structure for area change notification
      allOf:
        - $ref: "#/components/schemas/ApiNotificationEvent"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/AreaChangeEventData"

    AreaChangeEventData:
      type: object
      required:
        - subscriptionId
        - area
        - device
      properties:
        subscriptionId:
          type: string
          description: The ID of the subscription that triggered this notification
          example: "987654321"
        area:
          $ref: "#/components/schemas/Area"
        device:
          $ref: "#/components/schemas/Device"

    # ─────────────────────────────────────────────────────────────────────────
    # Subscription lifecycle event group (Commonalities-owned)
    # ─────────────────────────────────────────────────────────────────────────

    SubscriptionLifecycleEvent:
      description: |
        Subscription lifecycle event group, common to all CAMARA APIs that
        support explicit subscriptions.
      allOf:
        - $ref: "#/components/schemas/CloudEvent"
        - type: object
          properties:
            type:
              $ref: "#/components/schemas/SubscriptionLifecycleEventType"
      discriminator:
        propertyName: type
        mapping:
          org.camaraproject.iot-sim-fraud-prevention.v0.subscription-started: "#/components/schemas/EventSubscriptionStarted"
          org.camaraproject.iot-sim-fraud-prevention.v0.subscription-updated: "#/components/schemas/EventSubscriptionUpdated"
          org.camaraproject.iot-sim-fraud-prevention.v0.subscription-ended: "#/components/schemas/EventSubscriptionEnded"

    SubscriptionLifecycleEventType:
      type: string
      description: |
        Enum of subscription lifecycle event type strings.
      enum:
        - org.camaraproject.iot-sim-fraud-prevention.v0.subscription-started
        - org.camaraproject.iot-sim-fraud-prevention.v0.subscription-updated
        - org.camaraproject.iot-sim-fraud-prevention.v0.subscription-ended

    EventSubscriptionStarted:
      description: event structure for event subscription started
      allOf:
        - $ref: "#/components/schemas/SubscriptionLifecycleEvent"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SubscriptionStarted"

    SubscriptionStarted:
      description: Event detail structure for subscription started event
      type: object
      required:
        - initiationReason
        - subscriptionId
      properties:
        initiationReason:
          $ref: "#/components/schemas/InitiationReason"
        subscriptionId:
          $ref: "#/components/schemas/SubscriptionId"
        initiationDescription:
          type: string
          maxLength: 512
          description: Description of subscription initiation

    InitiationReason:
      type: string
      description: |
        - SUBSCRIPTION_CREATED - Subscription created by API Server
      enum:
        - SUBSCRIPTION_CREATED

    EventSubscriptionUpdated:
      description: event structure for event subscription updated
      allOf:
        - $ref: "#/components/schemas/SubscriptionLifecycleEvent"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SubscriptionUpdated"

    SubscriptionUpdated:
      description: Event detail structure for subscription updated event
      type: object
      required:
        - updateReason
        - subscriptionId
      properties:
        updateReason:
          $ref: "#/components/schemas/UpdateReason"
        subscriptionId:
          $ref: "#/components/schemas/SubscriptionId"
        updateDescription:
          type: string
          maxLength: 512
          description: Description of subscription update

    UpdateReason:
      type: string
      description: |
        - SUBSCRIPTION_ACTIVE - API server transitioned subscription status to `ACTIVE`
        - SUBSCRIPTION_INACTIVE - API server transitioned subscription status to `INACTIVE`
      enum:
        - SUBSCRIPTION_ACTIVE
        - SUBSCRIPTION_INACTIVE

    EventSubscriptionEnded:
      description: event structure for event subscription ended
      allOf:
        - $ref: "#/components/schemas/SubscriptionLifecycleEvent"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SubscriptionEnded"

    SubscriptionEnded:
      description: Event detail structure for subscription ended event
      type: object
      required:
        - terminationReason
        - subscriptionId
      properties:
        terminationReason:
          $ref: "#/components/schemas/TerminationReason"
        subscriptionId:
          $ref: "#/components/schemas/SubscriptionId"
        terminationDescription:
          type: string
          maxLength: 512
          description: Description of subscription termination

    TerminationReason:
      type: string
      description: |
        - NETWORK_TERMINATED - API server stopped sending notification
        - SUBSCRIPTION_EXPIRED - Subscription expire time (optionally set by the requester) has been reached
        - MAX_EVENTS_REACHED - Maximum number of events (optionally set by the requester) has been reached
        - ACCESS_TOKEN_EXPIRED - Access Token sinkCredential (optionally set by the requester with credential type `ACCESSTOKEN`) expiration time has been reached
        - SUBSCRIPTION_DELETED - Subscription was deleted by the requester
      enum:
        - MAX_EVENTS_REACHED
        - NETWORK_TERMINATED
        - SUBSCRIPTION_EXPIRED
        - ACCESS_TOKEN_EXPIRED
        - SUBSCRIPTION_DELETED

    # ─────────────────────────────────────────────────────────────────────────
    # Callback union (API project-owned)
    # ─────────────────────────────────────────────────────────────────────────

    NotificationEvent:
      description: |
        Union of all valid notification event groups at the callback endpoint.
      oneOf:
        - $ref: "#/components/schemas/ApiNotificationEvent"
        - $ref: "#/components/schemas/SubscriptionLifecycleEvent"

    # ---------- Subscription schemas ----------
    Subscription:
      description: Represents an event-type subscription.
      type: object
      required:
        - sink
        - protocol
        - config
        - types
        - id
        - startsAt
      properties:
        protocol:
          $ref: "#/components/schemas/Protocol"
        sink:
          type: string
          format: uri
          maxLength: 2048
          pattern: ^https:\/\/.+$
          description: The address to which events shall be delivered.
          example: "https://endpoint.example.com/sink"
        types:
          description: Event types eligible to be delivered.
          type: array
          minItems: 1
          maxItems: 1
          items:
            type: string
          example:
            - "org.camaraproject.iot-sim-fraud-prevention.v0.imei-change"
        config:
          $ref: "#/components/schemas/Config"
        id:
          type: string
          description: Unique identifier of the subscription.
          example: "1119920371"
        startsAt:
          type: string
          format: date-time
          description: Date when the subscription begins.
          example: "2023-07-03T12:27:08.312Z"
        expiresAt:
          type: string
          format: date-time
          description: Date when the subscription expires (if applicable).
          example: "2023-07-03T12:27:08.312Z"
        status:
          type: string
          description: Current status of the subscription.
          enum:
            - ACTIVATION_REQUESTED
            - ACTIVE
            - EXPIRED
            - INACTIVE
            - DELETED
      discriminator:
        propertyName: protocol
        mapping:
          HTTP: "#/components/schemas/HTTPSubscriptionResponse"
          MQTT3: "#/components/schemas/MQTTSubscriptionResponse"
          MQTT5: "#/components/schemas/MQTTSubscriptionResponse"
          AMQP: "#/components/schemas/AMQPSubscriptionResponse"
          NATS: "#/components/schemas/NATSSubscriptionResponse"
          KAFKA: "#/components/schemas/ApacheKafkaSubscriptionResponse"

    SubscriptionAsync:
      description: Response for a subscription request managed asynchronously
      type: object
      required:
        - id
      properties:
        id:
          $ref: "#/components/schemas/SubscriptionId"

    SubscriptionId:
      type: string
      maxLength: 256
      description: The unique identifier of the subscription
      example: "1119920371"

    SubscribeFraudPreventionResponseAsync:
      description: Response for an asynchronous subscription creation.
      type: object
      properties:
        subscriptionId:
          type: string
          description: The unique identifier of the subscription.
          example: "1119920371"
      required:
        - subscriptionId

    SubscribeFraudPreventionRequest:
      description: Request to create a subscription.
      type: object
      required:
        - sink
        - protocol
        - config
        - types
      properties:
        config:
          $ref: "#/components/schemas/Config"
        types:
          description: Event types to subscribe to (only one allowed per subscription).
          type: array
          minItems: 1
          maxItems: 1
          items:
            $ref: "#/components/schemas/ApiEventType"
        protocol:
          $ref: "#/components/schemas/Protocol"
        sink:
          type: string
          format: uri
          maxLength: 2048
          pattern: ^https:\/\/.+$
          description: The callback URL where notifications will be sent.
          example: "https://endpoint.example.com/sink"
        sinkCredential:
          $ref: "#/components/schemas/SinkCredential"
      discriminator:
        propertyName: protocol
        mapping:
          HTTP: "#/components/schemas/HTTPSubscriptionRequest"
          MQTT3: "#/components/schemas/MQTTSubscriptionRequest"
          MQTT5: "#/components/schemas/MQTTSubscriptionRequest"
          AMQP: "#/components/schemas/AMQPSubscriptionRequest"
          NATS: "#/components/schemas/NATSSubscriptionRequest"
          KAFKA: "#/components/schemas/ApacheKafkaSubscriptionRequest"

    Config:
      description: Configuration parameters for the subscription.
      type: object
      required:
        - subscriptionDetail
      properties:
        subscriptionDetail:
          $ref: "#/components/schemas/SubscriptionDetail"
        subscriptionExpireTime:
          type: string
          format: date-time
          example: "2023-01-17T13:18:23.682Z"
        subscriptionMaxEvents:
          type: integer
          minimum: 1
          example: 5
        initialEvent:
          type: boolean

    SubscriptionDetail:
      description: Details specific to the subscribed events.
      type: object
      properties:
        device:
          $ref: "#/components/schemas/Device"
      required:
        - device

    Protocol:
      type: string
      enum: ["HTTP", "MQTT3", "MQTT5", "AMQP", "NATS", "KAFKA"]
      description: Delivery protocol (only HTTP is currently allowed).
      example: "HTTP"

    # ---------- Sink credentials ----------
    SinkCredential:
      type: object
      description: Authentication/authorization information for the callback sink.
      properties:
        credentialType:
          type: string
          enum:
            - PLAIN
            - ACCESSTOKEN
            - PRIVATE_KEY_JWT
      discriminator:
        propertyName: credentialType
        mapping:
          PLAIN: "#/components/schemas/PlainCredential"
          ACCESSTOKEN: "#/components/schemas/AccessTokenCredential"
          PRIVATE_KEY_JWT: "#/components/schemas/PrivateKeyJWTCredential"
      required:
        - credentialType

    PlainCredential:
      type: object
      description: Plain username/password credential.
      allOf:
        - $ref: "#/components/schemas/SinkCredential"
        - type: object
          required:
            - identifier
            - secret
          properties:
            identifier:
              type: string
            secret:
              type: string

    AccessTokenCredential:
      type: object
      description: Bearer token credential.
      allOf:
        - $ref: "#/components/schemas/SinkCredential"
        - type: object
          properties:
            accessToken:
              type: string
            accessTokenExpiresUtc:
              type: string
              format: date-time
              example: "2023-07-03T12:27:08.312Z"
            accessTokenType:
              type: string
              enum:
                - bearer
          required:
            - accessToken
            - accessTokenExpiresUtc
            - accessTokenType

    PrivateKeyJWTCredential:
      type: object
      description: Use PRIVATE_KEY_JWT to get an access token. The authorization server information needed for this type of sink credential (token endpoint, client ID, JWKS URL) is shared upfront between the client and the CAMARA entity. This type of credential is to be used by clients that have an authorization server.
      allOf:
        - $ref: "#/components/schemas/SinkCredential"

    # ---------- Device identification (same as main API) ----------
    Device:
      description: End-user device identification.
      type: object
      properties:
        phoneNumber:
          $ref: "#/components/schemas/PhoneNumber"
        networkAccessIdentifier:
          $ref: "#/components/schemas/NetworkAccessIdentifier"
        ipv4Address:
          $ref: "#/components/schemas/DeviceIpv4Addr"
        ipv6Address:
          $ref: "#/components/schemas/DeviceIpv6Address"
      minProperties: 1

    PhoneNumber:
      type: string
      pattern: '^\+[1-9][0-9]{4,14}$'
      example: "+123456789"

    NetworkAccessIdentifier:
      type: string
      example: "123456789@domain.com"

    DeviceIpv4Addr:
      type: object
      properties:
        publicAddress:
          $ref: "#/components/schemas/SingleIpv4Addr"
        privateAddress:
          $ref: "#/components/schemas/SingleIpv4Addr"
        publicPort:
          $ref: "#/components/schemas/Port"
      anyOf:
        - required: [publicAddress, privateAddress]
        - required: [publicAddress, publicPort]
      example:
        publicAddress: "84.125.93.10"
        publicPort: 59765

    SingleIpv4Addr:
      type: string
      format: ipv4
      example: "84.125.93.10"

    Port:
      type: integer
      minimum: 0
      maximum: 65535

    DeviceIpv6Address:
      type: string
      format: ipv6
      example: "2001:db8:85a3:8d3:1319:8a2e:370:7344"

    # ---------- Geographic area (used in AREA_CHANGE notification) ----------
    Area:
      description: Geographic area.
      type: object
      properties:
        areaType:
          $ref: "#/components/schemas/AreaType"
        point:
          $ref: "#/components/schemas/Point"
      required:
        - areaType
      discriminator:
        propertyName: areaType
        mapping:
          CIRCLE: "#/components/schemas/Circle"

    AreaType:
      type: string
      enum:
        - CIRCLE

    Circle:
      description: Circular area.
      allOf:
        - $ref: "#/components/schemas/Area"
        - type: object
          properties:
            center:
              $ref: "#/components/schemas/Point"
            radius:
              type: integer
              minimum: 1
              maximum: 200000
          required:
            - center
            - radius
      example:
        areaType: CIRCLE
        center:
          latitude: 50.735851
          longitude: 7.10066
        radius: 50000

    Point:
      type: object
      required:
        - latitude
        - longitude
      properties:
        latitude:
          $ref: "#/components/schemas/Latitude"
        longitude:
          $ref: "#/components/schemas/Longitude"
      example:
        latitude: 50.735851
        longitude: 7.10066

    Latitude:
      type: number
      format: double
      minimum: -90
      maximum: 90
      example: 50.735851

    Longitude:
      type: number
      format: double
      minimum: -180
      maximum: 180
      example: 7.10066

    # ---------- Error ----------
    ErrorInfo:
      description: Common error schema.
      type: object
      required:
        - status
        - code
        - message
      properties:
        status:
          type: integer
        code:
          type: string
        message:
          type: string

    # ---------- Protocol-specific subscription schemas ----------
    HTTPSubscriptionRequest:
      description: Subscription request for HTTP-based event delivery.
      allOf:
        - $ref: "#/components/schemas/SubscribeFraudPreventionRequest"
        - type: object
          properties:
            protocolSettings:
              $ref: "#/components/schemas/HTTPSettings"

    HTTPSubscriptionResponse:
      description: Subscription resource returned for HTTP-based event delivery.
      allOf:
        - $ref: "#/components/schemas/Subscription"
        - type: object
          properties:
            protocolSettings:
              $ref: "#/components/schemas/HTTPSettings"

    HTTPSettings:
      type: object
      description: HTTP protocol settings for event delivery.
      properties:
        headers:
          type: object
          description: |-
            A set of key/value pairs that is copied into the HTTP request as custom headers.
          additionalProperties:
            type: string
            maxLength: 512
        method:
          type: string
          description: The HTTP method to use for sending the message.
          enum:
            - POST

    # Other protocol schemas (MQTT, AMQP, etc.) would be defined here if needed
    MQTTSubscriptionRequest:
      allOf:
        - $ref: "#/components/schemas/SubscribeFraudPreventionRequest"
        - type: object
          properties:
            protocolSettings:
              $ref: "#/components/schemas/MQTTSettings"

    MQTTSubscriptionResponse:
      allOf:
        - $ref: "#/components/schemas/Subscription"
        - type: object
          properties:
            protocolSettings:
              $ref: "#/components/schemas/MQTTSettings"

    MQTTSettings:
      type: object
      properties:
        topicName:
          type: string
          maxLength: 256
          description: MQTT topic name
        qos:
          type: integer
          format: int32
          minimum: 0
          maximum: 2
          description: Quality of Service level (0, 1, or 2)
        retain:
          type: boolean
        expiry:
          type: integer
          format: int32
          minimum: 0
          maximum: 2147483647
          description: Message expiry interval in seconds
        userProperties:
          type: object
      required:
        - topicName

    AMQPSubscriptionRequest:
      allOf:
        - $ref: "#/components/schemas/SubscribeFraudPreventionRequest"
        - type: object
          properties:
            protocolSettings:
              $ref: "#/components/schemas/AMQPSettings"

    AMQPSubscriptionResponse:
      allOf:
        - $ref: "#/components/schemas/Subscription"
        - type: object
          properties:
            protocolSettings:
              $ref: "#/components/schemas/AMQPSettings"

    AMQPSettings:
      type: object
      properties:
        address:
          type: string
          maxLength: 512
        linkName:
          type: string
          maxLength: 256
        senderSettlementMode:
          type: string
          enum: ["settled", "unsettled"]
        linkProperties:
          type: object
          additionalProperties:
            type: string
            maxLength: 1024

    ApacheKafkaSubscriptionRequest:
      allOf:
        - $ref: "#/components/schemas/SubscribeFraudPreventionRequest"
        - type: object
          properties:
            protocolSettings:
              $ref: "#/components/schemas/ApacheKafkaSettings"

    ApacheKafkaSubscriptionResponse:
      allOf:
        - $ref: "#/components/schemas/Subscription"
        - type: object
          properties:
            protocolSettings:
              $ref: "#/components/schemas/ApacheKafkaSettings"

    ApacheKafkaSettings:
      type: object
      properties:
        topicName:
          type: string
          maxLength: 249
        partitionKeyExtractor:
          type: string
          maxLength: 512
        clientId:
          type: string
          maxLength: 256
        ackMode:
          type: integer
          format: int32
          minimum: 0
          maximum: 2
          description: Acknowledgment mode (0=no ack, 1=leader ack, 2=all replicas ack)
      required:
        - topicName

    NATSSubscriptionRequest:
      allOf:
        - $ref: "#/components/schemas/SubscribeFraudPreventionRequest"
        - type: object
          properties:
            protocolSettings:
              $ref: "#/components/schemas/NATSSettings"

    NATSSubscriptionResponse:
      allOf:
        - $ref: "#/components/schemas/Subscription"
        - type: object
          properties:
            protocolSettings:
              $ref: "#/components/schemas/NATSSettings"

    NATSSettings:
      type: object
      properties:
        subject:
          type: string
          maxLength: 256
          description: NATS subject
      required:
        - subject

  # ---------- Responses ----------
  responses:
    SubscribeBadRequest400:
      description: Bad Request
      headers:
        x-correlator:
          $ref: "#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ErrorInfo"
              - type: object
                properties:
                  status:
                    enum:
                      - 400
                  code:
                    enum:
                      - INVALID_ARGUMENT
                      - OUT_OF_RANGE
                      - INVALID_PROTOCOL
                      - INVALID_CREDENTIAL
                      - INVALID_SINK
          examples:
            Insufficient Device Parameters:
              description: Sufficient parameters must be provided to allow the target UE to be identified
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "At least one of phoneNumber, networkAccessIdentifier, ipv4Address and ipv6Address must be specified"
            Insufficient Types Parameters:
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "SubscriptionType must be specified"
            Invalid Sink Value:
              value:
                status: 400
                code: INVALID_SINK
                message: "The sink field must be an accessible client address in order to notify the other end when an event occurs"
            Invalid Protocol Value:
              value:
                status: 400
                code: INVALID_PROTOCOL
                message: "The value of Protocol can only be HTTP, MQTT3, MQTT5, AMQP, NATS, KAFKA"

    CallbackBadRequest400:
      description: Bad Request
      headers:
        x-correlator:
          $ref: "#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ErrorInfo"
              - type: object
                properties:
                  status:
                    enum:
                      - 400
                  code:
                    enum:
                      - INVALID_ARGUMENT
          examples:
            Insufficient Id Parameters:
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "Id must be specified"
            Insufficient Type Parameters:
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "Type must be specified"
            Insufficient Time Parameters:
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "Time must be specified"
            Insufficient Data Parameters:
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "Data must be specified"

    Generic400:
      description: Bad Request
      headers:
        x-correlator:
          $ref: "#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ErrorInfo"
              - type: object
                properties:
                  status:
                    enum:
                      - 400
                  code:
                    enum:
                      - INVALID_ARGUMENT
          examples:
            GENERIC_400_INVALID_ARGUMENT:
              description: Invalid Argument. Generic Syntax Exception
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: Client specified an invalid argument, request body or query param.

    Generic401:
      description: Unauthorized
      headers:
        x-correlator:
          $ref: "#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ErrorInfo"
              - type: object
                properties:
                  status:
                    enum:
                      - 401
                  code:
                    enum:
                      - UNAUTHENTICATED
                      - AUTHENTICATION_REQUIRED
          examples:
            GENERIC_401_UNAUTHENTICATED:
              description: Request cannot be authenticated
              value:
                status: 401
                code: UNAUTHENTICATED
                message: Request not authenticated due to missing, invalid, or expired credentials.
            GENERIC_401_AUTHENTICATION_REQUIRED:
              description: New authentication is needed, authentication is no longer valid
              value:
                status: 401
                code: AUTHENTICATION_REQUIRED
                message: New authentication is required.

    Generic403:
      description: Forbidden
      headers:
        x-correlator:
          $ref: "#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ErrorInfo"
              - type: object
                properties:
                  status:
                    enum:
                      - 403
                  code:
                    enum:
                      - PERMISSION_DENIED
          examples:
            GENERIC_403_PERMISSION_DENIED:
              description: Permission denied. OAuth2 token access does not have the required scope or when the user fails operational security
              value:
                status: 403
                code: PERMISSION_DENIED
                message: Client does not have sufficient permissions to perform this action.

    Generic404:
      description: Not found
      headers:
        x-correlator:
          $ref: "#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ErrorInfo"
              - type: object
                properties:
                  status:
                    enum:
                      - 404
                  code:
                    enum:
                      - NOT_FOUND
                      - IDENTIFIER_NOT_FOUND
          examples:
            GENERIC_404_NOT_FOUND:
              description: Resource is not found
              value:
                status: 404
                code: NOT_FOUND
                message: The specified resource is not found.

    Subscribe422:
      description: Unprocessable Content
      headers:
        x-correlator:
          $ref: "#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ErrorInfo"
              - type: object
                properties:
                  status:
                    enum:
                      - 422
                  code:
                    enum:
                      - MISSING_IDENTIFIER
                      - UNSUPPORTED_IDENTIFIER
                      - UNNECESSARY_IDENTIFIER
          examples:
            Missing Identifier:
              description: An identifier is not included in the request and the device cannot be identified from the 2-legged access token
              value:
                status: 422
                code: MISSING_IDENTIFIER
                message: An identifier is not included in the request and the device cannot be identified from the 2-legged access token

    Callback410:
      description: Gone
      headers:
        x-correlator:
          $ref: "#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ErrorInfo"
              - type: object
                properties:
                  status:
                    enum:
                      - 410
                  code:
                    enum:
                      - GONE
          examples:
            GENERIC_410_GONE:
              description: Use in notifications flow to allow API Consumer to indicate that its callback is no longer available
              value:
                status: 410
                code: GONE
                message:
                  Access to the target resource is no longer available.

    Generic429:
      description: Too Many Requests
      headers:
        x-correlator:
          $ref: "#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ErrorInfo"
              - type: object
                properties:
                  status:
                    enum:
                      - 429
                  code:
                    enum:
                      - QUOTA_EXCEEDED
                      - TOO_MANY_REQUESTS
          examples:
            GENERIC_429_QUOTA_EXCEEDED:
              description: Request is rejected due to exceeding a business quota limit
              value:
                status: 429
                code: QUOTA_EXCEEDED
                message: Rejected due to exceeding a business quota limit.
            GENERIC_429_TOO_MANY_REQUESTS:
              description: API Server request limit is overpassed
              value:
                status: 429
                code: TOO_MANY_REQUESTS
                message: Rejected due to request rate limit overpassed.
